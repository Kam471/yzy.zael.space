<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YZY Catalog</title>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
<style>
:root {
  --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --space-1:0.25rem;--space-2:0.5rem;--space-3:0.75rem;--space-4:1rem;
  --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-12:3rem;
  --radius-sm:0.25rem;--radius-md:0.5rem;--radius-lg:0.75rem;--radius-full:9999px;
  --transition:160ms cubic-bezier(0.16,1,0.3,1);
  --font-body:'Satoshi','Inter',sans-serif;
  --bg:#0e0d0c;--surface:#141311;--surface-2:#1a1917;--surface-3:#222120;
  --border:rgba(255,255,255,0.07);--text:#e8e5df;--muted:#857f76;--faint:#4a4641;
  --accent:#c9a14a;--accent-dim:rgba(201,161,74,0.12);
  --green:#4a9c5e;--green-dim:rgba(74,156,94,0.12);
  --orange:#c97d3a;--orange-dim:rgba(201,125,58,0.12);
  --red:#b84040;--red-dim:rgba(184,64,64,0.12);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.6);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-sm);color:var(--text);background:var(--bg);}
img{display:block;max-width:100%;}
button,input,select{font:inherit;color:inherit;cursor:pointer;background:none;border:none;}
::selection{background:rgba(201,161,74,0.3);}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:var(--radius-sm);}

.app{display:grid;grid-template-columns:220px 1fr;grid-template-rows:auto 1fr;min-height:100dvh;}

/* HEADER */
.header{
  grid-column:1/-1;display:flex;align-items:center;gap:var(--space-4);
  padding:var(--space-4) var(--space-6);border-bottom:1px solid var(--border);
  background:var(--surface);position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:var(--space-3);margin-right:auto;}
.logo svg{color:var(--accent);flex-shrink:0;}
.logo-text{font-size:var(--text-base);font-weight:700;letter-spacing:0.12em;}
.header-meta{font-size:var(--text-xs);color:var(--muted);white-space:nowrap;}
.header-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:var(--space-2);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* SIDEBAR */
.sidebar{
  padding:var(--space-4) var(--space-4) var(--space-6);border-right:1px solid var(--border);
  background:var(--surface);display:flex;flex-direction:column;gap:var(--space-8);
  position:sticky;top:57px;height:calc(100dvh - 57px);overflow-y:auto;
}
.sidebar::-webkit-scrollbar{width:4px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* SOURCE TABS */
.source-tabs{display:flex;gap:var(--space-1);background:var(--surface-2);border-radius:var(--radius-md);padding:3px;}
.source-tab{
  flex:1;padding:var(--space-2) var(--space-2);border-radius:calc(var(--radius-md) - 2px);
  font-size:var(--text-xs);font-weight:600;letter-spacing:0.05em;text-align:center;
  color:var(--muted);transition:background var(--transition),color var(--transition);
}
.source-tab.active{background:var(--surface-3);color:var(--text);}
.source-tab:hover:not(.active){color:var(--text);}

.sidebar-section{display:flex;flex-direction:column;gap:var(--space-2);}
.sidebar-label{
  font-size:var(--text-xs);font-weight:600;letter-spacing:0.08em;color:var(--muted);
  text-transform:uppercase;padding:0 var(--space-5) var(--space-1);
  margin-top: var(--space-5);
}
.stat-card{padding:var(--space-3) var(--space-4);background:var(--surface-2);border-radius:var(--radius-md);border:1px solid var(--border);}
.stat-val{font-size:var(--text-xl);font-weight:700;font-variant-numeric:tabular-nums lining-nums;line-height:1;}
.stat-lbl{font-size:var(--text-xs);color:var(--muted);margin-top:var(--space-1);}
.filter-btn{
  display:flex;align-items:center;justify-content:space-between;
  padding:var(--space-2) var(--space-3);border-radius:var(--radius-sm);
  font-size:var(--text-sm);color:var(--muted);
  transition:background var(--transition),color var(--transition);width:100%;
}
.filter-btn:hover{background:var(--surface-2);color:var(--text);}
.filter-btn.active{background:var(--accent-dim);color:var(--accent);}
.filter-btn .count{font-size:var(--text-xs);color:var(--faint);font-variant-numeric:tabular-nums;}
.filter-btn.active .count{color:var(--accent);opacity:0.7;}

/* Category filters — bully tab */
.cat-filter-btn{
  display:flex;align-items:center;justify-content:space-between;
  padding:var(--space-2) var(--space-3);border-radius:var(--radius-sm);
  font-size:var(--text-xs);color:var(--muted);
  transition:background var(--transition),color var(--transition);width:100%;
}
.cat-filter-btn:hover{background:var(--surface-2);color:var(--text);}
.cat-filter-btn.active{background:var(--accent-dim);color:var(--accent);}
.cat-filter-btn .count{font-size:10px;color:var(--faint);font-variant-numeric:tabular-nums;}
.cat-filter-btn.active .count{color:var(--accent);opacity:0.7;}

/* MAIN */
.main{overflow-y:auto;display:flex;flex-direction:column;}
.toolbar{
  display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap;
  padding:var(--space-4) var(--space-6);border-bottom:1px solid var(--border);
  background:var(--surface);position:sticky;top:0;z-index:50;
}
.search-wrap{position:relative;flex:1;min-width:200px;}
.search-wrap svg{position:absolute;left:var(--space-3);top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none;}
.search-input{
  width:100%;padding:var(--space-2) var(--space-3) var(--space-2) var(--space-8);
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--text);
  transition:border-color var(--transition);
}
.search-input::placeholder{color:var(--faint);}
.search-input:focus{outline:none;border-color:var(--accent);}
.sort-select{
  padding:var(--space-2) var(--space-3);background:var(--surface-2);
  border:1px solid var(--border);border-radius:var(--radius-md);
  font-size:var(--text-sm);color:var(--text);cursor:pointer;
}
.sort-select:focus{outline:none;border-color:var(--accent);}
.view-toggle{display:flex;gap:var(--space-1);}
.view-btn{padding:var(--space-2);border-radius:var(--radius-sm);color:var(--faint);transition:background var(--transition),color var(--transition);}
.view-btn.active{background:var(--surface-3);color:var(--text);}
.view-btn:hover{color:var(--text);}
.result-count{font-size:var(--text-xs);color:var(--muted);white-space:nowrap;}

/* GRID */
.grid-container{padding:var(--space-6);}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(240px,100%),1fr));gap:var(--space-4);}
.product-grid.list-view{grid-template-columns:1fr;}

/* SKELETON */
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
.skeleton{background:linear-gradient(90deg,var(--surface-2) 25%,var(--surface-3) 50%,var(--surface-2) 75%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;}
.skel-img{aspect-ratio:1;border-radius:var(--radius-md);}
.skel-line{height:0.875em;border-radius:var(--radius-sm);margin-bottom:var(--space-2);}
.skel-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;padding:var(--space-3);}

/* PRODUCT CARD */
.product-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  overflow:hidden;transition:box-shadow var(--transition),border-color var(--transition),transform var(--transition);
  cursor:pointer;display:flex;flex-direction:column;
}
.product-card:hover{box-shadow:var(--shadow-lg);border-color:rgba(255,255,255,0.13);transform:translateY(-2px);}
.product-grid.list-view .product-card{flex-direction:row;align-items:center;}
.card-img-wrap{position:relative;aspect-ratio:1;overflow:hidden;background:var(--surface-2);flex-shrink:0;}
.product-grid.list-view .card-img-wrap{width:80px;height:80px;aspect-ratio:unset;border-radius:var(--radius-md);margin:var(--space-3) 0 var(--space-3) var(--space-3);}
.card-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);}
.product-card:hover .card-img-wrap img{transform:scale(1.04);}
.card-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--faint);}
.stock-badge{
  position:absolute;top:var(--space-2);right:var(--space-2);
  padding:2px var(--space-2);border-radius:var(--radius-full);
  font-size:10px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;
}
.badge-in{background:var(--green-dim);color:var(--green);}
.badge-low{background:var(--orange-dim);color:var(--orange);}
.badge-na{background:var(--surface-3);color:var(--faint);}
.card-body{padding:var(--space-3);flex:1;display:flex;flex-direction:column;gap:var(--space-2);min-width:0;}
.product-grid.list-view .card-body{padding:var(--space-3) var(--space-4);flex-direction:row;align-items:center;gap:var(--space-4);}
.card-name{font-size:var(--text-sm);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-slug{font-size:var(--text-xs);color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-price{font-size:var(--text-sm);font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;margin-top:auto;}
.product-grid.list-view .card-price{margin-top:0;margin-left:auto;flex-shrink:0;}
.card-date{font-size:var(--text-xs);color:var(--faint);}
.card-designer{font-size:var(--text-xs);color:var(--accent);opacity:0.8;letter-spacing:0.04em;}

/* SIZE STOCK CHIPS */
.size-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px;}
.size-chip{
  padding:2px 6px;border-radius:var(--radius-sm);font-size:10px;font-weight:600;
  font-variant-numeric:tabular-nums;border:1px solid var(--border);
}
.chip-in{background:var(--green-dim);color:var(--green);border-color:rgba(74,156,94,0.2);}
.chip-low{background:var(--orange-dim);color:var(--orange);border-color:rgba(201,125,58,0.2);}
.chip-na{background:var(--surface-3);color:var(--faint);border-color:transparent;}

/* TOOLTIP */
.has-tooltip{position:relative;}
.has-tooltip .tt{
  display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:#1a1917;border:1px solid var(--border);border-radius:var(--radius-md);
  padding:var(--space-2) var(--space-3);font-size:var(--text-xs);color:var(--text);
  white-space:pre-line;z-index:200;pointer-events:none;width:max-content;max-width:220px;
  box-shadow:var(--shadow-lg);line-height:1.5;
}
.has-tooltip:hover .tt{display:block;}

.stock-bar-wrap{display:flex;align-items:center;gap:var(--space-2);}
.stock-bar{flex:1;height:3px;background:var(--surface-3);border-radius:2px;overflow:hidden;}
.stock-bar-fill{height:100%;border-radius:2px;transition:width 0.6s cubic-bezier(0.16,1,0.3,1);}
.stock-bar-fill.high{background:var(--green);}
.stock-bar-fill.med{background:var(--orange);}
.stock-bar-fill.na{background:var(--surface-3);}
.stock-num{font-size:10px;color:var(--faint);font-variant-numeric:tabular-nums;white-space:nowrap;}

/* BULLY LOADING PROGRESS */
.bully-progress{padding:var(--space-6);display:flex;flex-direction:column;align-items:center;gap:var(--space-4);color:var(--muted);}
.progress-bar-wrap{width:100%;max-width:320px;height:3px;background:var(--surface-3);border-radius:2px;overflow:hidden;}
.progress-bar-inner{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s ease;}

/* EMPTY / ERROR */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--space-12);color:var(--muted);text-align:center;gap:var(--space-4);}
.empty svg{color:var(--faint);}
.empty h3{font-size:var(--text-lg);font-weight:600;color:var(--text);}
.empty p{font-size:var(--text-sm);max-width:30ch;}
.error-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--space-12);gap:var(--space-4);text-align:center;}
.error-state h3{color:var(--red);font-size:var(--text-lg);}
.retry-btn{padding:var(--space-2) var(--space-5);background:var(--accent);color:#000;font-weight:600;border-radius:var(--radius-md);font-size:var(--text-sm);transition:opacity var(--transition);}
.retry-btn:hover{opacity:0.85;}

.mobile-store-bar{
  display:none;
  grid-column:1/-1;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:var(--space-2) var(--space-4);
  gap:var(--space-2);
  position:sticky;top:57px;z-index:90;
}
.mobile-store-bar button{
  flex:1;padding:var(--space-2) var(--space-3);
  border-radius:var(--radius-md);font-size:var(--text-xs);
  font-weight:600;letter-spacing:0.05em;text-align:center;
  color:var(--muted);background:var(--surface-2);
  transition:background var(--transition),color var(--transition);
}
.mobile-store-bar button.active{
  background:var(--accent-dim);color:var(--accent);
}

@media(max-width:767px){
  .app{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .mobile-store-bar{display:flex;}
  .toolbar{padding:var(--space-3) var(--space-4);}
  .grid-container{padding:var(--space-4);}
  .product-grid{grid-template-columns:repeat(auto-fill,minmax(min(160px,100%),1fr));gap:var(--space-3);}
}
@media(max-width:479px){.product-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>

<div id="lock-screen" style="
  position:fixed;inset:0;z-index:9999;
  background:rgba(14,13,12,0.85);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  display:flex;align-items:center;justify-content:center;
">
  <div style="
    background:#141311;border:1px solid rgba(255,255,255,0.07);
    border-radius:0.75rem;padding:2.5rem;width:100%;max-width:360px;
    display:flex;flex-direction:column;gap:1.25rem;text-align:center;
  ">
    <svg style="margin:0 auto;color:#c9a14a" width="36" height="36" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="4" fill="currentColor" fill-opacity="0.12"/>
      <path d="M6 8L11 14L6 20H9.5L14 14.8L18.5 20H22L17 14L22 8H18.5L14 13.2L9.5 8H6Z" fill="currentColor"/>
    </svg>
    <div>
      <div style="font-size:1.125rem;font-weight:700;letter-spacing:0.08em;color:#e8e5df;margin-bottom:0.25rem;">YZY CATALOG</div>
      <div style="font-size:0.8rem;color:#857f76;">Enter password to continue</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:0.5rem;">
      <input
        id="pw-input" type="password" placeholder="Password"
        style="padding:0.6rem 0.875rem;background:#1a1917;border:1px solid rgba(255,255,255,0.07);border-radius:0.5rem;font-size:0.9rem;color:#e8e5df;width:100%;transition:border-color 160ms;font-family:inherit;outline:none;"
        onkeydown="if(event.key==='Enter')checkPw()"
        onfocus="this.style.borderColor='#c9a14a'"
        onblur="this.style.borderColor='rgba(255,255,255,0.07)'"
      >
      <div id="pw-error" style="font-size:0.75rem;color:#b84040;display:none;">Incorrect password</div>
    </div>
    <button onclick="checkPw()" style="padding:0.625rem;background:#c9a14a;color:#000;font-weight:700;border-radius:0.5rem;font-size:0.875rem;font-family:inherit;cursor:pointer;transition:opacity 160ms;border:none;" onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">
      Unlock
    </button>
  </div>
</div>

<script>
var _h = '52ddc57513df18ccfcaf2e28de9aba5144b58679d39d092c0a48aeb593b96bc4';
var _k = 'yzy_auth';
var _t = 'ok_9f3a';
function _sha256(str){var buf=new TextEncoder().encode(str);return crypto.subtle.digest('SHA-256',buf).then(function(h){return Array.from(new Uint8Array(h)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');});}
function setCookie(n,v,d){var e=new Date(Date.now()+d*864e5).toUTCString();document.cookie=n+'='+v+'; expires='+e+'; path=/; SameSite=Strict';}
function getCookie(n){return document.cookie.split('; ').reduce(function(r,c){var p=c.split('=');return p[0]===n?p[1]:r;},null);}
function _removeLock(){var el=document.getElementById('lock-screen');if(!el)return;el.style.transition='opacity 0.3s ease';el.style.opacity='0';setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},300);}
function checkPw(){var val=document.getElementById('pw-input').value;_sha256(val).then(function(hash){if(hash===_h){setCookie(_k,_t,30);var app=document.querySelector('.app');if(app)app.style.display='';_removeLock();}else{var err=document.getElementById('pw-error');var inp=document.getElementById('pw-input');if(err)err.style.display='block';if(inp){inp.style.borderColor='#b84040';inp.value='';inp.focus();setTimeout(function(){if(inp)inp.style.borderColor='rgba(255,255,255,0.07)';},1500);}}});}
document.addEventListener('DOMContentLoaded',function(){var app=document.querySelector('.app');if(getCookie(_k)===_t){var el=document.getElementById('lock-screen');if(el&&el.parentNode)el.parentNode.removeChild(el);if(app)app.style.display='';}else{if(app)app.style.display='none';var inp=document.getElementById('pw-input');if(inp)inp.focus();}});
var _obs=new MutationObserver(function(mutations){mutations.forEach(function(m){m.removedNodes.forEach(function(node){if(node.id==='lock-screen'&&getCookie(_k)!==_t){var app=document.querySelector('.app');if(app)app.style.display='none';location.reload();}});});});
_obs.observe(document.body,{childList:true,subtree:false});
</script>

<div class="app">

  <header class="header">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="4" fill="currentColor" fill-opacity="0.12"/>
        <path d="M6 8L11 14L6 20H9.5L14 14.8L18.5 20H22L17 14L22 8H18.5L14 13.2L9.5 8H6Z" fill="currentColor"/>
      </svg>
      <span class="logo-text"> zael's log</span>
    </div>
    <span class="header-meta"><span class="header-dot"></span><span id="last-updated">Fetching...</span></span>
    <span class="header-meta" id="header-count" style="display:none"></span>
  </header>

  <div class="mobile-store-bar">
    <button id="mob-tab-swell" class="active" onclick="switchSource('swell')">YZY Store</button>
    <button id="mob-tab-bully" onclick="switchSource('bully')">BULLY</button>
  </div>

  <aside class="sidebar">

    <div class="source-tabs">
      <button class="source-tab active" id="tab-swell" onclick="switchSource('swell')">YZY Store</button>
      <button class="source-tab" id="tab-bully" onclick="switchSource('bully')">BULLY</button>
    </div>

    <div id="sidebar-swell" style="display:flex;flex-direction:column;gap:var(--space-5);">
      <div class="sidebar-section">
        <div class="sidebar-label">Overview</div>
        <div class="stat-card">
          <div class="stat-val" id="stat-total">--</div>
          <div class="stat-lbl">Total Products</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="stat-in" style="color:var(--green)">--</div>
          <div class="stat-lbl">In Stock</div>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Availability</div>
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">
          All Items <span class="count" id="cnt-all">--</span>
        </button>
        <button class="filter-btn" data-filter="in" onclick="setFilter('in',this)">
          In Stock <span class="count" id="cnt-in">--</span>
        </button>
        <button class="filter-btn" data-filter="low" onclick="setFilter('low',this)">
          Low Stock <span class="count" id="cnt-low">--</span>
        </button>
      </div>
    </div>

    <div id="sidebar-bully" style="display:none;flex-direction:column;gap:var(--space-5);">
      <div class="sidebar-section">
        <div class="sidebar-label">Overview</div>
        <div class="stat-card">
          <div class="stat-val" id="b-stat-total">--</div>
          <div class="stat-lbl">Total Products</div>
        </div>
        <div class="stat-card">

        <div class="skel-card"><div class="skeleton skel-img"></div><div style="padding:0.5rem 0"><div class="skeleton skel-line" style="width:70%"></div><div class="skeleton skel-line" style="width:45%"></div></div></div>
        <div class="skel-card"><div class="skeleton skel-img"></div><div style="padding:0.5rem 0"><div class="skeleton skel-line" style="width:70%"></div><div class="skeleton skel-line" style="width:45%"></div></div></div>
        <div class="skel-card"><div class="skeleton skel-img"></div><div style="padding:0.5rem 0"><div class="skeleton skel-line" style="width:70%"></div><div class="skeleton skel-line" style="width:45%"></div></div></div>
        <div class="skel-card"><div class="skeleton skel-img"></div><div style="padding:0.5rem 0"><div class="skeleton skel-line" style="width:70%"></div><div class="skeleton skel-line" style="width:45%"></div></div></div>

<script>
// ─── UTILITIES ────────────────────────────────────────────
function debounce(func, timeout = 200) {
  let timer;
  return (...args) => {
    clearTimeout(timer);
    timer = setTimeout(() => { func.apply(this, args); }, timeout);
  };
}

const debouncedApplyFilters = debounce(() => applyFilters(), 200);

// ─── CONFIG ───────────────────────────────────────────────
const SWELL_URL = 'https://yzy-prod.swell.store/api/products?limit=1000';
const SWELL_AUTH = 'Basic ' + btoa('pk_UDtBUDIgX4j2StzcMPjwb7pfsmM1deoK:');
const BULLY_BASE = 'https://square-salad-516d.noahdoespython.workers.dev/?url=https://checkout.yeezy.com/products/';
const BULLY_SLUGS = [
  'red-vinyl','digital-album','clear-vinyl','standard-vinyl','bully-cd',
  'bully-ts-o7-box-w','bully-jp-ts-o7-box-r','bully-jp-ts-o7-box-b',
  'bully-jp-hd-o1-box-b','bully-cassette','180g-black-vinyl','white-lp-signed',
  'chrome-lp-signed','bully-cd-signed','bully-jp-hd-o1-box-r','bully-lp-signed',
  'bully-lp-signed-clear','ls-o3-ye-live-red','ts-o7-htr-grey','hd-o1-htr-grey',
  'hd-o1-red','ls-o3-ye-live-yellow','hd-o1-yellow','ls-o3-mask-white',
  'hd-o1-globe-black','ls-o3-globe-black','ts-o7-red','ls-o3-mask-red',
  'ls-o3-ye-live-white','ts-o7-black','ls-o3-ye-live-black','ls-o3-mask-yellow',
  'hd-o1-globe-htr-grey','ht-o1-htr-grey','ls-o3-mask-black','hd-o1-black',
  'ts-o7-yellow','red-lp-signed','brown-vinyl','grey-vinyl','blue-vinyl',
  'gr-o1','chrome-vinyl','bully-ts-o7-box-b','tan-vinyl'
];

const FALLBACK_SVG = `<div class="card-img-placeholder"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>`;

window.handleImgError = function(el) {
  var wrap = el.parentElement;
  if (wrap) {
    el.remove();
    wrap.insertAdjacentHTML('afterbegin', FALLBACK_SVG);
  }
};

function getBullyCategory(slug) {
  if (/^(ts-o7|hd-o1|ls-o3|ht-o1|gr-o1)/.test(slug)) return 'apparel';
  if (/^bully-(ts-o7|jp-ts|jp-hd|hd-o1)-box/.test(slug)) return 'bundles';
  return 'music';
}

// ─── STATE ────────────────────────────────────────────────
let allProducts = [];
let bullyProducts = [];
let bullyLoaded = false;
let currentSource = 'swell';
let currentFilter = 'all';
let currentView = 'grid';
let bullyCategory = 'all';
let bullyAvail = 'all';

// Virtual Scroll State
let filteredItemsState = [];
let currentBuildFn = null;
let currentIndex = 0;
const BATCH_SIZE = 40;
let gridObserver = null;

// ─── SWELL HELPERS ────────────────────────────────────────
function stockLevel(p) {
  const val = (p.purchasable_stock !== null && p.purchasable_stock !== undefined)
    ? p.purchasable_stock
    : (p.stock_level !== null && p.stock_level !== undefined ? p.stock_level : null);
  if (val === null || val === undefined) return { label: 'na', val: null };
  if (val <= 0) return { label: 'na', val: 0 };
  if (val <= 10) return { label: 'low', val: val };
  return { label: 'in', val: val };
}

function fmtDate(d) {
  return d ? new Date(d).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }) : '--';
}

function fmtPrice(amount, isCents) {
  if (amount === null || amount === undefined) return null;
  const val = isCents ? amount / 100 : amount;
  return '$' + Number(val).toFixed(0);
}

function imgUrl(p) {
  // Override for PK-01 to use high-quality CDN URL
  if (p.slug === 'pk-01') {
    return 'https://yeezy.com/cdn-cgi/image/width=1204,height=1204,quality=100,compression=fast,slow-connection-quality=80,fit=pad,gravity=center,background=transparent/https://cdn.swell.store/yzy-prod/694d83a9ecc8af00131f2a26/9d6efa4534bdcf10ac476c7106673383/PK-01-SNOW-CAMO-1.png';
  }
  
  const imgs = p.images || [];
  return (imgs.length && imgs[0].file) ? imgs[0].file.url : null;
}

function makeImg(src, alt) {
  if (!src) return FALLBACK_SVG;
  return `<img src="${src}" alt="${alt || ''}" width="240" height="240" loading="lazy" decoding="async" onerror="handleImgError(this)">`;
}

// ─── SWELL CARD ───────────────────────────────────────────
function buildSwellCard(p, isListView) {
  const sl = stockLevel(p);
  const price = fmtPrice(p.price, false);
  const date = fmtDate(p.date_created);
  const img = imgUrl(p);
  const designer = p.attributes?.designer?.value || null;
  const stockPct = sl.label === 'na' ? 0 : sl.val !== null ? Math.min(100,(sl.val/200)*100) : 60;
  const fillClass = sl.label === 'na' ? 'na' : sl.label === 'low' ? 'med' : 'high';
  const badgeClass = sl.label === 'na' ? 'badge-na' : sl.label === 'low' ? 'badge-low' : 'badge-in';
  const badgeText = sl.label === 'na' ? 'N/A' : sl.label === 'low' ? 'Low' : 'In Stock';
  const stockDisplay = sl.label === 'na' ? 'Data unavailable' : sl.val !== null ? sl.val : '--';
  const imgHtml = makeImg(img, p.name);
  const stockHtml = `<div class="stock-bar-wrap"><div class="stock-bar"><div class="stock-bar-fill ${fillClass}" style="width:${stockPct}%"></div></div><span class="stock-num">${stockDisplay}</span></div>`;

  if (isListView) {
    return `<article class="product-card" tabindex="0">
      <div class="card-img-wrap">${imgHtml}<span class="stock-badge ${badgeClass}">${badgeText}</span></div>
      <div class="card-body">
        <div>
          <div class="card-name">${p.name||'Unknown'}</div>
          <div class="card-slug">${p.slug||''}</div>
          ${designer ? `<div class="card-designer">Design by ${designer}</div>` : ''}
        </div>
        <div style="display:flex;gap:1rem;align-items:center;margin-left:auto;flex-shrink:0;">
          <span class="card-date">${date}</span>
          ${stockHtml}
          ${price ? `<div class="card-price">${price}</div>` : ''}
        </div>
      </div>
    </article>`;
  }
  return `<article class="product-card" tabindex="0">
    <div class="card-img-wrap">${imgHtml}<span class="stock-badge ${badgeClass}">${badgeText}</span></div>
    <div class="card-body">
      <div class="card-name">${p.name||'Unknown'}</div>
      <div class="card-slug">${p.slug||''}</div>
      ${designer ? `<div class="card-designer">Design by ${designer}</div>` : ''}
      ${stockHtml}
      <div class="card-date">${date}</div>
      ${price ? `<div class="card-price">${price}</div>` : ''}
    </div>
  </article>`;
}

// ─── BULLY CARD ───────────────────────────────────────────
function buildBullyCard(p, isListView) {
  const available = p.available;
  const price = fmtPrice(p.price ? p.price.cents : null, true);
  const date = fmtDate(p.published_at);
  const img = p.featured_image ? p.featured_image.url : null;
  const imgHtml = makeImg(img, p.name);

  const variants = p.variants || [];
  let chipsHtml = '';
  if (variants.length > 0 && variants[0].options && variants[0].options.SIZE) {
    const chips = variants.map(v => {
      const qty = v.inventory_quantity || 0;
      const cls = qty <= 0 ? 'chip-na' : qty <= 10 ? 'chip-low' : 'chip-in';
      return `<span class="size-chip ${cls}">${v.title} · ${qty}</span>`;
    }).join('');
    chipsHtml = `<div class="size-chips">${chips}</div>`;
  }

  const desc = (p.description || '').replace(/<br\s*\/?>/gi, '\n').replace(/<[^>]+>/g, '').trim();
  const nameHtml = desc
    ? `<div class="card-name has-tooltip">${p.name||'Unknown'}<span class="tt">${desc}</span></div>`
    : `<div class="card-name">${p.name||'Unknown'}</div>`;

  const badgeClass = available ? 'badge-in' : 'badge-na';
  const badgeText = available ? 'Available' : 'Unavailable';

  if (isListView) {
    return `<article class="product-card" tabindex="0">
      <div class="card-img-wrap">${imgHtml}<span class="stock-badge ${badgeClass}">${badgeText}</span></div>
      <div class="card-body">
        <div>${nameHtml}<div class="card-slug">${p.handle||''}</div></div>
        <div style="display:flex;gap:1rem;align-items:center;margin-left:auto;flex-shrink:0;">
          ${chipsHtml}
          <span class="card-date">${date}</span>
          ${price ? `<div class="card-price">${price}</div>` : ''}
        </div>
      </div>
    </article>`;
  }
  return `<article class="product-card" tabindex="0">
    <div class="card-img-wrap">${imgHtml}<span class="stock-badge ${badgeClass}">${badgeText}</span></div>
    <div class="card-body">
      ${nameHtml}
      <div class="card-slug">${p.handle||''}</div>
      ${chipsHtml}
      <div class="card-date">${date}</div>
      ${price ? `<div class="card-price">${price}</div>` : ''}
    </div>
  </article>`;
}

// ─── SIDEBAR UPDATES ──────────────────────────────────────
function updateSwellSidebar(products) {
  const total = products.length;
  const inStock = products.filter(p => stockLevel(p).label === 'in').length;
  const lowStock = products.filter(p => stockLevel(p).label === 'low').length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-in').textContent = inStock + lowStock;
  document.getElementById('cnt-all').textContent = total;
  document.getElementById('cnt-in').textContent = inStock;
  document.getElementById('cnt-low').textContent = lowStock;
}

function updateBullySidebar(products) {
  const apparel = products.filter(p => getBullyCategory(p.handle) === 'apparel').length;
  const music = products.filter(p => getBullyCategory(p.handle) === 'music').length;
  const bundles = products.filter(p => getBullyCategory(p.handle) === 'bundles').length;
  const inStock = products.filter(p => p.available).length;
  const outStock = products.filter(p => !p.available).length;
  document.getElementById('b-stat-total').textContent = products.length;
  document.getElementById('b-stat-in').textContent = inStock;
  document.getElementById('bcat-all').textContent = products.length;
  document.getElementById('bcat-apparel').textContent = apparel;
  document.getElementById('bcat-music').textContent = music;
  document.getElementById('bcat-bundles').textContent = bundles;
  document.getElementById('bavail-all').textContent = products.length;
  document.getElementById('bavail-in').textContent = inStock;
  document.getElementById('bavail-out').textContent = outStock;
}

// ─── FILTERS ──────────────────────────────────────────────
function applyFilters() {
  if (currentSource === 'swell') applySwellFilters();
  else applyBullyFilters();
}

function applySwellFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const sort = document.getElementById('sort-sel').value;
  const filtered = allProducts.filter(p => {
    const sl = stockLevel(p).label;
    const designer = p.attributes?.designer?.value || null;
    const matchFilter = currentFilter === 'all' || sl === currentFilter;
    const matchSearch = !q || (p.name||'').toLowerCase().includes(q) || (p.slug||'').toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });
  filtered.sort((a,b) => {
    switch(sort) {
      case 'date-desc': return new Date(b.date_created||0)-new Date(a.date_created||0);
      case 'date-asc':  return new Date(a.date_created||0)-new Date(b.date_created||0);
      case 'price-asc': return (a.price||0)-(b.price||0);
      case 'price-desc': return (b.price||0)-(a.price||0);
      case 'name-asc': return (a.name||'').localeCompare(b.name||'');
      case 'stock-desc': return (stockLevel(b).val||0)-(stockLevel(a).val||0);
      default: return 0;
    }
  });
  renderGrid(filtered, buildSwellCard);
}

function applyBullyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const sort = document.getElementById('sort-sel').value;
  let filtered = bullyProducts.filter(p => {
    const cat = getBullyCategory(p.handle);
    const matchCat = bullyCategory === 'all' || cat === bullyCategory;
    const matchAvail = bullyAvail === 'all' || (bullyAvail === 'in' ? p.available : !p.available);
    const matchSearch = !q || (p.name || '').toLowerCase().includes(q) || (p.handle || '').toLowerCase().includes(q);
    return matchCat && matchAvail && matchSearch;
  });

  filtered.sort((a, b) => {
    const dateA = new Date(a.published_at || 0);
    const dateB = new Date(b.published_at || 0);

    switch (sort) {
      case 'date-asc':
        return dateA - dateB;
      case 'price-asc':
        return ((a.price && a.price.cents) || 0) - ((b.price && b.price.cents) || 0);
      case 'price-desc':
        return ((b.price && b.price.cents) || 0) - ((a.price && a.price.cents) || 0);
      case 'name-asc':
        return (a.name || '').localeCompare(b.name || '');
      case 'stock-desc': {
        const aQty = (a.variants || []).reduce((s, v) => s + (v.inventory_quantity || 0), 0);
        const bQty = (b.variants || []).reduce((s, v) => s + (v.inventory_quantity || 0), 0);
        return bQty - aQty;
      }
      case 'date-desc':
      default:
        return dateB - dateA;
    }
  });
  renderGrid(filtered, buildBullyCard);
}

// ─── VIRTUAL SCROLL RENDERER ──────────────────────────────
function renderGrid(items, buildFn) {
  const grid = document.getElementById('product-grid');
  filteredItemsState = items;
  currentBuildFn = buildFn;
  currentIndex = 0;
  grid.innerHTML = '';

  if (items.length === 0) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><h3>No products found</h3><p>Try adjusting your filters or search.</p></div>`;
    updateResultCount(0);
    return;
  }

  // Create sentinel for scrolling
  const sentinel = document.createElement('div');
  sentinel.id = 'grid-sentinel';
  sentinel.style.height = '20px';
  sentinel.style.gridColumn = '1 / -1';
  grid.appendChild(sentinel);

  appendNextBatch();

  if (gridObserver) gridObserver.disconnect();
  gridObserver = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting && currentIndex < filteredItemsState.length) {
      appendNextBatch();
    }
  }, { rootMargin: '400px' });
  gridObserver.observe(sentinel);
}

function appendNextBatch() {
  const grid = document.getElementById('product-grid');
  const sentinel = document.getElementById('grid-sentinel');
  const isList = currentView === 'list';
  const batch = filteredItemsState.slice(currentIndex, currentIndex + BATCH_SIZE);
  
  if (batch.length === 0) return;

  const fragment = document.createDocumentFragment();
  const temp = document.createElement('div');
  temp.innerHTML = batch.map(p => currentBuildFn(p, isList)).join('');
  
  while (temp.firstChild) {
    fragment.appendChild(temp.firstChild);
  }
  
  grid.insertBefore(fragment, sentinel);
  currentIndex += batch.length;
  updateResultCount(currentIndex);

  if (currentIndex >= filteredItemsState.length && gridObserver) {
    gridObserver.disconnect();
  }
}

function updateResultCount(showing) {
  const total = currentSource === 'swell' ? allProducts.length : bullyProducts.length;
  document.getElementById('result-count').textContent = `${showing} of ${filteredItemsState.length} products`;
  const hCount = document.getElementById('header-count');
  hCount.textContent = total + ' products';
  hCount.style.display = 'block';
}

function setFilter(val, btn) {
  currentFilter = val;
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function setBullyCategory(val, btn) {
  bullyCategory = val;
  document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function setBullyAvail(val, btn) {
  bullyAvail = val;
  document.querySelectorAll('[data-avail]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function setView(v) {
  currentView = v;
  document.getElementById('product-grid').classList.toggle('list-view', v === 'list');
  document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
  document.getElementById('btn-list').classList.toggle('active', v === 'list');
  applyFilters();
}

// ─── SOURCE SWITCHER ──────────────────────────────────────
function switchSource(src) {
  currentSource = src;
  
  // Update Desktop Tabs
  document.getElementById('tab-swell').classList.toggle('active', src === 'swell');
  document.getElementById('tab-bully').classList.toggle('active', src === 'bully');
  
  // Update Mobile Switcher
  document.getElementById('mob-tab-swell').classList.toggle('active', src === 'swell');
  document.getElementById('mob-tab-bully').classList.toggle('active', src === 'bully');

  document.getElementById('sidebar-swell').style.display = src === 'swell' ? 'flex' : 'none';
  const bs = document.getElementById('sidebar-bully');
  bs.style.display = src === 'bully' ? 'flex' : 'none';
  document.getElementById('search').value = '';

  if (src === 'bully') {
    if (!bullyLoaded) fetchBullyProducts();
    else applyFilters();
  } else {
    applyFilters();
  }
}

// ─── SWELL FETCH ──────────────────────────────────────────
async function fetchProducts() {
  try {
    const res = await fetch(SWELL_URL, { headers: { 'Authorization': SWELL_AUTH, 'Content-Type': 'application/json' } });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    allProducts = data.results || [];
    updateSwellSidebar(allProducts);
    if (currentSource === 'swell') applyFilters();
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    if (currentSource === 'swell') {
      document.getElementById('product-grid').innerHTML = `<div class="error-state" style="grid-column:1/-1"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><h3>Failed to load</h3><p style="color:var(--muted);font-size:var(--text-sm)">${e.message}</p><button class="retry-btn" onclick="fetchProducts()">Retry</button></div>`;
    }
    document.getElementById('last-updated').textContent = 'Error loading data';
  }
}

// ─── BULLY FETCH ──────────────────────────────────────────
async function fetchBullyProducts() {
  // Check Cache
  const cached = sessionStorage.getItem('bully_cache');
  if (cached) {
    try {
      bullyProducts = JSON.parse(cached);
      bullyLoaded = true;
      updateBullySidebar(bullyProducts);
      document.getElementById('last-updated').textContent = 'Loaded from cache';
      applyFilters();
      return;
    } catch(e) { console.error("Cache corrupted"); }
  }

  const grid = document.getElementById('product-grid');
  grid.innerHTML = `<div class="bully-progress" style="grid-column:1/-1">
    <div id="bully-prog-header" style="font-size:var(--text-sm);color:var(--muted)">Loading BULLY catalog...</div>
    <div class="progress-bar-wrap"><div class="progress-bar-inner" id="bully-prog" style="width:0%"></div></div>
    <div id="bully-prog-text" style="font-size:var(--text-xs);color:var(--faint)">0 / ${BULLY_SLUGS.length}</div>
  </div>`;

  const results = [];
  const CONCURRENCY = 6;
  let completed = 0;

  function updateProgress() {
    completed++;
    const pct = Math.round((completed / BULLY_SLUGS.length) * 100);
    const bar = document.getElementById('bully-prog');
    const txt = document.getElementById('bully-prog-text');
    if (bar) bar.style.width = pct + '%';
    if (txt) txt.textContent = `${completed} / ${BULLY_SLUGS.length}`;
  }

  async function fetchSlug(slug) {
    try {
      const res = await fetch(BULLY_BASE + slug + '.js');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      data._slug = slug;
      data._category = getBullyCategory(slug);
      return data;
    } catch {
      return null;
    } finally {
      updateProgress();
    }
  }

  for (let i = 0; i < BULLY_SLUGS.length; i += CONCURRENCY) {
    const batch = BULLY_SLUGS.slice(i, i + CONCURRENCY);
    const batchResults = await Promise.all(batch.map(fetchSlug));
    batchResults.forEach(r => { if (r) results.push(r); });
  }

  bullyProducts = results;
  bullyLoaded = true;
  sessionStorage.setItem('bully_cache', JSON.stringify(bullyProducts));
  updateBullySidebar(bullyProducts);
  document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
  applyFilters();
}

// ─── INIT ─────────────────────────────────────────────────
fetchProducts();
setInterval(fetchProducts, 5 * 60 * 1000);
</script>
